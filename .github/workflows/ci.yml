name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System build deps (yara-python-dex compiles from source)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake libtool pkg-config flex bison libssl-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests examples
          ruff format --check src tests examples
      - name: Typecheck
        run: mypy src
      - name: Test (offline; corpus deselected by default)
        run: pytest -q
