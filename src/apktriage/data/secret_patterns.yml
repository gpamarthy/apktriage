# Curated hardcoded-secret regexes. Each entry:
#   name      human-readable label
#   regex     Python re pattern; the whole match is treated as the secret
#   severity  info|low|medium|high|critical
#   entropy   if true, the match is kept only when its Shannon entropy clears
#             the threshold in secrets.py (cuts placeholder/false-positive hits)
# Patterns are intentionally conservative and well-known (the same families
# MobSF / trufflehog / gitleaks ship) so they are easy to defend in review.

- name: Google API Key
  regex: 'AIza[0-9A-Za-z_\-]{35}'
  severity: high
  entropy: false

- name: Google OAuth Client ID
  regex: '[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'
  severity: medium
  entropy: false

- name: Firebase Database URL
  regex: 'https://[a-z0-9\-]+\.firebaseio\.com'
  severity: medium
  entropy: false

- name: AWS Access Key ID
  regex: 'A(?:KIA|SIA|GPA|IDA|ROA)[0-9A-Z]{16}'
  severity: high
  entropy: false

- name: Slack Token
  regex: 'xox[baprs]-[0-9A-Za-z\-]{10,72}'
  severity: high
  entropy: false

- name: Slack Webhook
  regex: 'https://hooks\.slack\.com/services/[A-Za-z0-9/]+'
  severity: medium
  entropy: false

- name: JSON Web Token
  regex: 'eyJ[A-Za-z0-9_\-]{8,}\.eyJ[A-Za-z0-9_\-]{8,}\.[A-Za-z0-9_\-]{8,}'
  severity: medium
  entropy: false

- name: PEM Private Key
  regex: '-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
  severity: critical
  entropy: false

- name: Generic API Key Assignment
  regex: '(?i)(?:api[_\-]?key|apikey|secret|passwd|password|auth[_\-]?token)["'']?\s*[:=]\s*["''][0-9A-Za-z_\-/+]{12,}["'']'
  severity: medium
  entropy: true

- name: Bearer Token
  regex: '(?i)bearer\s+[0-9A-Za-z_\-\.=]{20,}'
  severity: medium
  entropy: true
